title: Untitled (Abstract Composition)
artist: Kirill Zdanevich
date: ca. 1920s
medium: Watercolor on paper
image: untitled-abstract-composition-zdanevich.jpg
tags:
  - Russian Avant-Garde
  - Georgian Futurism
  - Abstraction
reviewStatus: draft
sourceCitation: >-
  CATALOGUE_AVANTGARDE/JPG/zdanevitch-3.jpg — signed "K.Zdenevitch" in the
  image itself (not just the filename). Not individually pictured in
  CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, but consistent in
  medium, abstract style, and Latin-alphabet "K.Zdanevich" signature form
  with the Kirill Zdanevich (1892-1969) works catalogued there on pp. 37-39
  ("Abstract composition, ca. 1920's" and "Untitled, ca. 1920s", watercolor
  and pencil on paper). This specific sheet is not positively identified as
  one of those named pieces.
caption_fr: >-
  Composition abstraite à l'aquarelle de Kirill Zdanevitch, organisant des
  plans colorés superposés, des cercles et des lignes rayonnantes. Signée «
  K.Zdanevitch » en bas à droite, vers les années 1920.
caption_en: >-
  A watercolor abstract composition by Kirill Zdanevich, arranging
  overlapping colored planes, circles, and radiating lines. Signed
  "K.Zdanevitch" lower right, ca. 1920s.
caption_ru: >-
  Абстрактная композиция акварелью работы Кирилла Зданевича, выстраивающая
  наложенные друг на друга цветные плоскости, круги и расходящиеся линии.
  Подписана «K.Zdanevitch» внизу справа, около 1920-х годов.
caption_de: >-
  Eine abstrakte Aquarellkomposition von Kirill Zdanewitsch, die überlappende
  farbige Flächen, Kreise und strahlenförmige Linien anordnet. Unten rechts
  mit „K.Zdanevitch" signiert, um die 1920er Jahre.
