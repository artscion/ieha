title: Sailboat
artist: Alexei Kruchenykh
date: ca. 1916
medium: Mixed media on paper, collage
image: sailboat.jpg
tags:
  - Russian Avant-Garde
  - Collage
  - Zaum
reviewStatus: draft
sourceCitation: >-
  CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, p. 51 ("Alexei
  Kruchenykh (1886-1968), Sailboat, ca.1916, Mixed media on paper, collage,
  11.5 x 8 in / 27.5 x 21.5 cm"). Image copied from
  CATALOGUE_AVANTGARDE/JPG/krychenykh_parusnik.jpg — the filename "parusnik"
  is Russian for "sailboat", and the image shows a photographic fragment of a
  moored sailboat plus cut-paper letters spelling "КРУЧЕНЫХ" (Kruchenykh).
  The exact composition differs in detail from the plate reproduced on p. 51
  (different crop/coloring), so this may be a variant sheet from the same
  series rather than the identical object — flagged for DC to confirm against
  the physical/high-res catalogue plate.
caption_fr: >-
  Collage en papier de technique mixte d'Alexeï Krouchenykh associant un
  fragment photographique d'un voilier amarré à du papier de couleur découpé
  et à un texte manuscrit, signé par l'artiste, vers 1916.
caption_en: >-
  A mixed-media paper collage by Alexei Kruchenykh combining a photographic
  fragment of a moored sailboat with cut colored paper and handwritten text,
  signed by the artist, ca. 1916.
caption_ru: >-
  Коллаж из смешанной техники на бумаге работы Алексея Крученых, сочетающий
  фотографический фрагмент пришвартованной парусной лодки с цветной бумагой и
  рукописным текстом, подписан художником, около 1916 года.
caption_de: >-
  Eine Mixed-Media-Papiercollage von Alexei Krutschonych, die ein
  fotografisches Fragment eines vertäuten Segelboots mit ausgeschnittenem
  farbigem Papier und handschriftlichem Text kombiniert, vom Künstler
  signiert, um 1916.
