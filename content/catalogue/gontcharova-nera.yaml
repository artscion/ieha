title: Gontcharova Nera
artist: Mikhail Larionov
date: ca. 1916
medium: Mixed media on paper, collage
image: gontcharova-nera.jpg
tags:
  - Russian Avant-Garde
  - Collage
reviewStatus: draft
sourceCitation: >-
  CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, p. 56 ("Mikhail LARIONOV,
  GONTCHAROVA NERA, ca.1916, Mixed media on paper, collage, 11.5 x 21 in / 30
  x 53 cm, Signed bottom centre"). Image copied from
  CATALOGUE_AVANTGARDE/JPG/Larionov 35.jpg, which shows the same signature
  ("M. Larionov" in cursive) and the same cut-paper letters spelling
  "GONTCHAROVA" described in the catalogue entry.
caption_fr: >-
  Collage en papier de technique mixte de Mikhail Larionov, dont la surface
  est composée de fragments de papier découpés et superposés formant le mot
  « GONTCHAROVA » autour d'une petite silhouette. Signé au crayon par
  l'artiste, vers 1916.
caption_en: >-
  A mixed-media paper collage by Mikhail Larionov, its surface built from cut
  and layered paper fragments spelling out "GONTCHAROVA" around a small
  silhouette figure. Signed by the artist in pencil, ca. 1916.
caption_ru: >-
  Коллаж из смешанной техники на бумаге работы Михаила Ларионова: вырезанные и
  наложенные друг на друга бумажные фрагменты складываются в надпись
  «GONTCHAROVA» рядом с силуэтной фигуркой. Подписан художником карандашом,
  около 1916 года.
caption_de: >-
  Eine Mixed-Media-Papiercollage von Michail Larionow, deren Oberfläche aus
  ausgeschnittenen, überlagerten Papierfragmenten besteht, die das Wort
  „GONTCHAROVA" neben einer kleinen Silhouettenfigur bilden. Vom Künstler mit
  Bleistift signiert, um 1916.
