title: Suprematist Composition
artist: Nikolay Suetin
date: 1920-1922
medium: Pencil and gouache on paper
image: suprematist-composition-1920-1922.jpg
tags:
  - Russian Avant-Garde
  - Suprematism
reviewStatus: draft
sourceCitation: >-
  CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, p. 35 ("Nikolay Suetin
  (1897-1954), Suprematist Composition, 1920-1922, Pencil and gouache on
  paper, 17.5 x 9 in / 45 x 23.6 cm, Signed in left corner in Cyrillic
  'СУЕТИН' (SUETIN)"). Image copied from
  CATALOGUE_AVANTGARDE/JPG/zdanevitch-6.jpg, which matches this catalogued
  work (same suprematist composition and visible "СУЕТИН"/"SUETIN"
  signature; catalogue text says signature is in the left corner, this scan
  shows it lower right — same work, minor discrepancy in the catalogue's own
  description). Note: this file was found in the "zdanevitch"-named batch of
  scans, which per direct inspection contains works by several artists, not
  only Zdanevich — the filename is not the attribution here.
caption_fr: >-
  Composition suprématiste au crayon et à la gouache de Nikolaï Souetine,
  organisant des plans rectangulaires et semi-circulaires inclinés le long
  d'un axe diagonal. Signée « Suetin » en bas à droite, 1920-1922.
caption_en: >-
  A suprematist composition in pencil and gouache by Nikolay Suetin,
  arranging tilted rectangular and semicircular planes along a diagonal axis.
  Signed "Suetin" lower right, 1920-1922.
caption_ru: >-
  Супрематическая композиция карандашом и гуашью работы Николая Суетина,
  выстраивающая наклонные прямоугольные и полукруглые плоскости вдоль
  диагональной оси. Подписана «Суетин» внизу справа, 1920-1922 годы.
caption_de: >-
  Eine suprematistische Komposition in Bleistift und Gouache von Nikolai
  Suetin, die geneigte rechteckige und halbkreisförmige Flächen entlang einer
  diagonalen Achse anordnet. Unten rechts mit „Suetin" signiert, 1920-1922.
