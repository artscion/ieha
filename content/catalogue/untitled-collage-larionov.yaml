reviewStatus: draft
sourceCitation: >-
  CATALOGUE_AVANTGARDE/JPG/zdanevitch-27.jpg — signed "M. Larionov" in
  cursive within the image itself (not just the filename). Visually
  consistent with CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, p. 58
  ("Mikhail LARIONOV, Collage, 1910-1920's, Mixed media on paper, collage,
  9.4 x 13.2 in / 24 x 33.5 cm"), which shows a comparable arrangement of
  geometric planes and a white circular cutout, but is not positively
  confirmed as the identical sheet.
caption_fr: >-
  Collage en papier de technique mixte de Mikhail Larionov, composé de plans
  géométriques roses, gris-bleu et orange autour d'une forme circulaire
  blanche dentelée. Signé au crayon par l'artiste, années 1910-1920.
caption_en: >-
  A mixed-media paper collage by Mikhail Larionov built from geometric planes
  in pink, blue-grey, and orange around a jagged white circular form. Signed
  by the artist in pencil, 1910s-1920s.
caption_ru: >-
  Коллаж из смешанной техники на бумаге работы Михаила Ларионова, составленный
  из геометрических плоскостей розового, серо-голубого и оранжевого цветов
  вокруг зубчатой белой круглой формы. Подписан художником карандашом,
  1910-1920-е годы.
caption_de: >-
  Eine Mixed-Media-Papiercollage von Michail Larionow aus geometrischen
  Flächen in Rosa, Blaugrau und Orange um eine gezackte weiße Kreisform. Vom
  Künstler mit Bleistift signiert, 1910er-1920er Jahre.
