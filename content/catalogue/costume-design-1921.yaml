title: Costume Design
artist: Pavel Tchelitchew
date: '1921'
medium: Watercolor and pencil on paper
image: /catalogue/costume-design-1921/image.jpg
showInHero: true
tags:
  - Russian Avant-Garde
  - Theatrical Design
sourceCitation: >-
  CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, p. 66 ("Tchelitchew Pavel
  (1898-1957), Costume Design, 1921, Watercolor and pencil on paper, Sheet: 17.1
  x 12.6 in; Drawing: 13.6 x 9.1 in, Signed in lower left corner in Latin
  'P.Tchelitchff 1921'"). Image copied from
  CATALOGUE_AVANTGARDE/JPG/zdanevitch-13.jpg, which matches this catalogued work
  exactly (same striding warrior composition and visible "P.Tchelitchef 1921"
  signature). Note: this file was found in the "zdanevitch"-named batch of
  scans, which per direct inspection contains works by several artists, not only
  Zdanevich — the filename is not the attribution here.
reviewStatus: approved
caption_fr: >-
  Maquette de costume à l'aquarelle et au crayon de Pavel Tchelitchew
  représentant une figure de guerrier en marche, aux drapés anguleux et
  facettés, signée et datée par l'artiste, 1921.
caption_en: >-
  A watercolor and pencil costume design by Pavel Tchelitchew depicting a
  striding warrior figure in angular, faceted drapery, signed and dated by the
  artist, 1921.
caption_ru: >-
  Эскиз театрального костюма акварелью и карандашом работы Павла Челищева,
  изображающий шагающую фигуру воина в угловатых, гранёных драпировках, подписан
  и датирован художником, 1921 год.
caption_de: >-
  Ein Kostümentwurf in Aquarell und Bleistift von Pawel Tschelitschew, der eine
  schreitende Kriegerfigur in eckig-facettierter Drapierung zeigt, vom Künstler
  signiert und datiert, 1921.
