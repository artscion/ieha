title: Untitled (Collage)
artist: Alexei Kruchenykh
date: ca. 1916
medium: Mixed media on paper, collage
image: untitled-collage-kruchenykh-1.jpg
tags:
  - Russian Avant-Garde
  - Collage
  - Zaum
reviewStatus: draft
sourceCitation: >-
  CATALOGUE_AVANTGARDE/JPG/Kruch22.jpg — signed "А.Крученых" (A. Kruchenykh)
  in cursive within the collage, with fragments of handwritten Cyrillic text
  pasted in. Not individually pictured in
  CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, but consistent in medium,
  technique, and signature style with the three Kruchenykh collages
  catalogued there on pp. 52-54 ("Untitled (Talking...Just don't write... All
  imagined)", "Untitled (He ate cabbage soup)", "Untitled (Vlas's end...)",
  all ca.1916, mixed media on paper, collage). This specific sheet is not
  positively identified as one of those three named pieces.
caption_fr: >-
  Collage en papier de technique mixte d'Alexeï Krouchenykh associant des
  triangles de papier de couleur découpés à des fragments de texte manuscrit
  en cyrillique, signé « A. Krouchenykh » au crayon, vers 1916.
caption_en: >-
  A mixed-media paper collage by Alexei Kruchenykh combining cut colored
  paper triangles with fragments of handwritten Cyrillic text, signed "A.
  Kruchenykh" in pencil, ca. 1916.
caption_ru: >-
  Коллаж из смешанной техники на бумаге работы Алексея Крученых, сочетающий
  вырезанные цветные бумажные треугольники с фрагментами рукописного текста
  на кириллице, подписан «А. Крученых» карандашом, около 1916 года.
caption_de: >-
  Eine Mixed-Media-Papiercollage von Alexei Krutschonych, die ausgeschnittene
  farbige Papierdreiecke mit Fragmenten handschriftlichen kyrillischen Textes
  kombiniert, mit Bleistift „A. Krutschonych" signiert, um 1916.
