title: Untitled (Cubo-Futurist Composition)
artist: Clement Redko
date: '1919'
medium: Mixed media on board
image: /catalogue/cubo-futurist-composition/image.jpg
imageSourceUrl: >-
  https://eth-cms.ieha.art/files/original/b903394e93ed4af92272faa23106e94ab8690558.jpg
tags:
  - Russian Avant-Garde
  - Cubo-Futurism
sourceCitation: >-
  CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, p. 44 ("Clement REDKO
  (1897-1956), Untitled (Cubo-Futurist Composition), 1919, Mixed media on board,
  23.5 x 18.5 in / 60 x 47.5 cm, Signed in lower left corner in Latin 'Redko'").
  Image copied from CATALOGUE_AVANTGARDE/JPG/zdanevitch.jpg, which matches this
  catalogued work exactly (same composition and visible "Redko" signature bottom
  left). Note: this file was found in the "zdanevitch"-named batch of scans,
  which per direct inspection contains works by several artists, not only
  Zdanevich — the filename is not the attribution here.
reviewStatus: approved
caption_fr: >-
  Composition cubo-futuriste sans titre de Clément Redko, technique mixte sur
  panneau, construite à partir de plans angulaires et courbes imbriqués en ocre,
  noir et gris. Signée « Redko » en bas à gauche, 1919.
caption_en: >-
  An untitled cubo-futurist composition in mixed media on board by Clement
  Redko, built from interlocking angular and curved planes in ochre, black, and
  grey. Signed "Redko" lower left, 1919.
caption_ru: >-
  Беститульная кубофутуристическая композиция Климента Редько, смешанная техника
  на доске, построена из переплетающихся угловатых и изогнутых плоскостей
  охристого, чёрного и серого цветов. Подписана «Redko» внизу слева, 1919 год.
caption_de: >-
  Eine unbetitelte kubo-futuristische Komposition von Clement Redko in
  Mischtechnik auf Karton, aufgebaut aus ineinandergreifenden eckigen und
  gerundeten Flächen in Ocker, Schwarz und Grau. Unten links mit „Redko"
  signiert, 1919.
