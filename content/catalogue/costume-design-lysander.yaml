sourceCitation: >-
  CATALOGUE_AVANTGARDE/JPG/zdanevitch-17.jpg — inscribed "Лизандр" (Lysander,
  a character name) and a partially legible signature beginning "В.Кол..."
  Compare CATALOGUE_AVANTGARDE/Catalogue (spreads sm)-1.pdf, p. 71 ("Viktor
  Kolenda (1872-1942), Costume Design for a Knight, 1924, Pencil and
  watercolor on paper"), which documents Kolenda producing this type of
  costume design, but shows a different composition. ATTRIBUTION NOT FULLY
  CONFIRMED — based only on the partial signature and thematic match; this is
  the single most uncertain entry in this batch and should get close review.
caption_fr: >-
  Maquette de costume de théâtre à l'aquarelle et au crayon pour un
  personnage inscrit « Lysandre », dans la manière du travail de costumier
  documenté de Viktor Kolenda ; l'attribution repose sur une signature
  partielle et n'est pas pleinement confirmée.
caption_en: >-
  A watercolor and pencil theatrical costume design for a character inscribed
  "Lysander," in the manner of Viktor Kolenda's documented costume work; the
  attribution rests on a partial signature and is not fully confirmed.
caption_ru: >-
  Эскиз театрального костюма акварелью и карандашом для персонажа,
  надписанного «Лизандр», в манере документированных костюмных работ Виктора
  Коленды; атрибуция основана на частично читаемой подписи и не подтверждена
  полностью.
caption_de: >-
  Ein Aquarell- und Bleistift-Kostümentwurf für eine mit „Lysander"
